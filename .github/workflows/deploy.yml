name: Build and deploy ConfigTool

on:
  push:
    branches:
      - master
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v6

      - name: Set up NodeJS
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build ConfigTool
        run: npm run build

      - name: Upload ConfigTool to web root
        uses: Creepios/sftp-action@v1.0.5
        with:
          host: pkg.duet3d.com
          port: 22
          username: configtool
          privateKey: ${{ secrets.CONFIGTOOL_DEPLOY_KEY }}
          localPath: ./dist
          remotePath: /var/www/configtool
