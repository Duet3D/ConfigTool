name: Build and deploy ConfigTool

on:
  push:
    branches:
      - master
      - dev
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v6

      - name: Set up NodeJS
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build ConfigTool
        run: npm run build

      # Prerelease versions (alpha/beta/rc tagged in package.json) deploy under /beta
      # so the stable build at the web root stays untouched
      - name: Determine deployment target
        id: target
        run: |
          version=$(node -p "require('./package.json').version")
          if [[ "$version" =~ -(alpha|beta|rc) ]]; then
            echo "remote_path=/var/www/configtool/beta" >> "$GITHUB_OUTPUT"
          else
            echo "remote_path=/var/www/configtool" >> "$GITHUB_OUTPUT"
          fi

      - name: Upload ConfigTool to web root
        uses: Creepios/sftp-action@v1.0.5
        with:
          host: pkg.duet3d.com
          port: 22
          username: configtool
          privateKey: ${{ secrets.CONFIGTOOL_DEPLOY_KEY }}
          localPath: ./dist
          remotePath: ${{ steps.target.outputs.remote_path }}
